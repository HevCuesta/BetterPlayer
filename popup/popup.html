<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #ddd;
      background: #1a1a1a;
      padding: 16px;
    }
    h2 {
      font-size: 14px;
      color: #fff;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h2 .logo { color: #f50; font-weight: 800; }
    .section {
      margin-bottom: 14px;
    }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .pos-grid {
      display: grid;
      grid-template-areas:
        ". top ."
        "left . right"
        ". bottom .";
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
    }
    .pos-btn {
      padding: 6px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a2a;
      color: #ccc;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: all 0.15s;
    }
    .pos-btn:hover { background: #333; border-color: #666; }
    .pos-btn.active { background: #f50; color: #fff; border-color: #f50; }
    .pos-btn[data-pos="top"] { grid-area: top; }
    .pos-btn[data-pos="bottom"] { grid-area: bottom; }
    .pos-btn[data-pos="left"] { grid-area: left; }
    .pos-btn[data-pos="right"] { grid-area: right; }

    .mode-btns {
      display: flex;
      gap: 4px;
    }
    .mode-btn {
      flex: 1;
      padding: 6px 4px;
      border: 1px solid #444;
      border-radius: 4px;
      background: #2a2a2a;
      color: #ccc;
      cursor: pointer;
      font-size: 11px;
      text-align: center;
      transition: all 0.15s;
    }
    .mode-btn:hover { background: #333; border-color: #666; }
    .mode-btn.active { background: #f50; color: #fff; border-color: #f50; }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle-label { color: #ccc; }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #444;
      border-radius: 10px;
      transition: 0.2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #ddd;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: #f50;
    }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <h2><span class="logo">BP</span> BetterPlayer</h2>

  <div class="section">
    <div class="section-label">Player Position</div>
    <div class="pos-grid">
      <button class="pos-btn" data-pos="top">Top</button>
      <button class="pos-btn" data-pos="left">Left</button>
      <button class="pos-btn" data-pos="right">Right</button>
      <button class="pos-btn" data-pos="bottom">Bottom</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Extended Panel</div>
    <div class="toggle-row">
      <span class="toggle-label">Enable panel</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-panel" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="section-label" style="margin-top: 8px">Trigger</div>
    <div class="mode-btns">
      <button class="mode-btn" data-mode="hover">Hover</button>
      <button class="mode-btn" data-mode="click">Click</button>
      <button class="mode-btn" data-mode="pinned">Pinned</button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Sections</div>
    <div class="toggle-row">
      <span class="toggle-label">Waveform</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-waveform" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Comments</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-comments" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Track Info</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-info" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
